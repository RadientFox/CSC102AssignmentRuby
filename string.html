<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Validation</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <h1>Input Validation</h1>
    </header>
    <main>
        <!-- messages to user for inpust -->
        <div id="divMessage"></div>
        <form>
            <!-- add div tag to make both lable and input on same line -->
            <div>
                <label for="txtFirstName">First Name: </label>
                <input type="text" id="txtFirstName">
            </div>

            <div>
                <label for="txtLastName">Last Name: </label>
                <input type="text" id="txtLastName">
            </div>

            <div>
                <label for="txtZip">Zip Code: </label>
                <input type="text" id="txtZip">
            </div>

            <!-- button to validate form, type to button does not submit the form -->
            <button type="button" onclick="validate();">Validate!</button>



                <button type="button" onclick="playRandomeGame();">Play Game</button>
                <button type="button" onclick="stopGame();">Stop Game</button>

                            
            <div id="divMessagegame">Waiting for Game Start</div>
            <div id="divRandom1"></div>
            <div id="divRandom2"></div>
            <div id="divRandom3"></div>
            <div id="divRandomTotal"></div>
            <div id="divMessageEnd"></div>

        </form>
    </main>

<script src="12.1_thing.js"></script>
