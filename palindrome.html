<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>

    <!-- link to css file -->
    <link rel="stylesheet" href="main.css">


</head>
<body>

    <header>
        <h1>Palindrom Checker</h1>
    </header>
    <main>
        <form onsubmit="checkPalin(event);">

            <!-- label to expain what is needed -->
            <label for="txtWord"> Enter a word of phrase:</label>
            <!-- text box to type word -->
            <input type="text" id="txtWord">
            <!-- button to test teh word -->
            <input type="submit" value="Check word">
        </form>

        <!-- div to hold result of palindrome check -->
         <div id="divMessage"></div>


         <!-- will add audio to this div -->
         <div id="divAudio"></div>

         <!-- button will add audio elemet to div above -->
         <button id="btnAddAudio" onclick="addAudio();">Add Audio</button>

         <!-- 2 buttons to handle playing the sound-->
          <button id="btnPlayAudio" onclick="playAudio();" hidden>Play Audio</button>
          <button id="btnPauseAudio" onclick="pauseAudio();" hidden>Pause Audio</button>




    </main>
    
<script src="js_script.js"></script>

</body>
</html>
